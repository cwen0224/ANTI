<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindAR 圖像辨識測試</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 20px 0;
      gap: 10px;
    }

    #title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
      text-shadow: 0 0 20px rgba(99,179,237,.7);
    }

    /* tab switcher */
    #tab-bar {
      display: flex;
      gap: 8px;
      pointer-events: all;
      background: rgba(20,20,35,.75);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(14px);
    }

    .tab-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: rgba(200,210,255,.6);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .25s, color .25s, box-shadow .25s;
      letter-spacing: .04em;
    }
    .tab-btn.active {
      background: rgba(99,179,237,.25);
      color: #93c5fd;
      box-shadow: 0 0 14px rgba(99,179,237,.3);
    }

    /* status pill */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .04em;
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.15);
      transition: background .4s, border-color .4s, color .4s, box-shadow .4s;
      background: rgba(30,30,50,.7);
      color: rgba(200,200,220,.9);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    #status-pill.searching {
      background: rgba(20,30,60,.75);
      border-color: rgba(99,179,237,.4);
      color: #93c5fd;
      box-shadow: 0 0 20px rgba(99,179,237,.25);
    }
    #status-pill.found {
      background: rgba(6,78,59,.8);
      border-color: rgba(52,211,153,.6);
      color: #6ee7b7;
      box-shadow: 0 0 24px rgba(52,211,153,.45);
    }
    #status-pill.lost {
      background: rgba(60,20,20,.75);
      border-color: rgba(248,113,113,.4);
      color: #fca5a5;
      box-shadow: 0 0 20px rgba(248,113,113,.25);
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }

    /* scanner frame */
    #scanner-frame {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(72vw, 340px);
      aspect-ratio: 1;
      pointer-events: none;
      z-index: 998;
    }
    #scanner-frame .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: rgba(99,179,237,.7);
      border-style: solid;
      border-width: 0;
      transition: border-color .4s;
    }
    #scanner-frame.found .corner { border-color: rgba(52,211,153,.9); }
    .corner.tl { top:0;    left:0;  border-top-width:3px;    border-left-width:3px;  border-radius:4px 0 0 0; }
    .corner.tr { top:0;    right:0; border-top-width:3px;    border-right-width:3px; border-radius:0 4px 0 0; }
    .corner.bl { bottom:0; left:0;  border-bottom-width:3px; border-left-width:3px;  border-radius:0 0 0 4px; }
    .corner.br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 4px 0; }

    .scan-line {
      position: absolute;
      left: 6%; width: 88%; height: 2px;
      background: linear-gradient(90deg, transparent, #63b3ed, transparent);
      top: 0;
      animation: scan 2.2s ease-in-out infinite;
    }
    #scanner-frame.found .scan-line {
      background: linear-gradient(90deg, transparent, #34d399, transparent);
    }
    @keyframes scan {
      0%   { top: 4%;  opacity: 1; }
      50%  { top: 92%; opacity: .8; }
      100% { top: 4%;  opacity: 1; }
    }

    /* loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(5,5,15,.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity .6s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(99,179,237,.2);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-overlay p {
      color: rgba(200,210,255,.7);
      font-size: .85rem;
      letter-spacing: .05em;
    }

    /* bottom hint */
    #hint {
      position: fixed;
      bottom: 24px; left: 0; right: 0;
      text-align: center;
      font-size: .72rem;
      color: rgba(255,255,255,.32);
      pointer-events: none;
      z-index: 999;
      letter-spacing: .05em;
    }

    a-scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">載入 AR 引擎中…</p>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="title">📷 MindAR 圖像追蹤測試</div>

    <!-- Tab switcher -->
    <div id="tab-bar">
      <button class="tab-btn active" id="btn-t1" onclick="switchTarget(1)">目標 1</button>
      <button class="tab-btn"        id="btn-t2" onclick="switchTarget(2)">目標 2</button>
    </div>

    <div id="status-pill" class="searching">
      <div class="dot"></div>
      <span id="status-text">掃描中，請對準目標圖片…</span>
    </div>
  </div>

  <!-- Scanner frame -->
  <div id="scanner-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
  </div>

  <!-- Hint -->
  <div id="hint">將鏡頭對準你的 AR 目標圖片</div>

  <!-- AR Scene (will be rebuilt on switch) -->
  <div id="scene-container"></div>

  <script>
    const pill      = document.getElementById('status-pill');
    const pillText  = document.getElementById('status-text');
    const frame     = document.getElementById('scanner-frame');
    const hint      = document.getElementById('hint');
    const loadingEl = document.getElementById('loading-overlay');
    const loadTxt   = document.getElementById('loading-text');

    const MIND_URLS = {
      1: './targets.mind',
      2: './targets2.mind'
    };
    const MINDS = { 1: null, 2: null }; // 將存放 Blob URL

    let currentTarget = 1;
    let sceneEl = null;
    let lostTimer = null;

    function setFound(on) {
      clearTimeout(lostTimer);
      if (on) {
        pill.className = 'found';
        pillText.textContent = '✅ 目標圖片已辨識！';
        frame.classList.add('found');
        hint.textContent = 'MindAR 成功追蹤目標 🎉';
      } else {
        pill.className = 'lost';
        pillText.textContent = '❌ 目標丟失，繼續掃描…';
        frame.classList.remove('found');
        hint.textContent = '將鏡頭對準你的 AR 目標圖片';
        lostTimer = setTimeout(() => {
          if (pill.className !== 'found') {
            pill.className = 'searching';
            pillText.textContent = '掃描中，請對準目標圖片…';
          }
        }, 1500);
      }
    }

    function buildScene(mindSrc) {
      // Remove existing scene
      const container = document.getElementById('scene-container');
      container.innerHTML = '';

      const scene = document.createElement('a-scene');
      scene.setAttribute('mindar-image',
        `imageTargetSrc: ${mindSrc}; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;`);
      scene.setAttribute('color-space', 'sRGB');
      scene.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

      // Camera
      const cam = document.createElement('a-camera');
      cam.setAttribute('position', '0 0 0');
      cam.setAttribute('look-controls', 'enabled: false');
      scene.appendChild(cam);

      // Target entity
      const targetEntity = document.createElement('a-entity');
      targetEntity.setAttribute('mindar-image-target', 'targetIndex: 0');
      targetEntity.id = 'ar-target';

      const plane = document.createElement('a-plane');
      plane.setAttribute('width', '1');
      plane.setAttribute('height', '1');
      plane.setAttribute('color', '#34d399');
      plane.setAttribute('opacity', '0.18');
      plane.setAttribute('position', '0 0 0.001');
      plane.setAttribute('material', 'shader: flat; side: double;');

      const wireframe = document.createElement('a-plane');
      wireframe.setAttribute('width', '1.05');
      wireframe.setAttribute('height', '1.05');
      wireframe.setAttribute('color', '#34d399');
      wireframe.setAttribute('opacity', '0.6');
      wireframe.setAttribute('material', 'wireframe: true; shader: flat;');

      const text = document.createElement('a-text');
      text.setAttribute('value', `✔ 目標 ${currentTarget} 辨識成功！`);
      text.setAttribute('align', 'center');
      text.setAttribute('color', '#6ee7b7');
      text.setAttribute('width', '2');
      text.setAttribute('position', '0 0.62 0');

      targetEntity.appendChild(plane);
      targetEntity.appendChild(wireframe);
      targetEntity.appendChild(text);
      scene.appendChild(targetEntity);

      // Events
      scene.addEventListener('loaded', () => {
        // Hide loading after short delay
        setTimeout(() => {
          loadingEl.classList.add('hidden');
          pill.className = 'searching';
          pillText.textContent = '掃描中，請對準目標圖片…';
        }, 800);

        const t = document.getElementById('ar-target');
        t.addEventListener('targetFound', () => setFound(true));
        t.addEventListener('targetLost',  () => setFound(false));
      });

      container.appendChild(scene);
      sceneEl = scene;
    }

    function switchTarget(num) {
      if (num === currentTarget) return;
      currentTarget = num;

      // Update tabs
      document.getElementById('btn-t1').classList.toggle('active', num === 1);
      document.getElementById('btn-t2').classList.toggle('active', num === 2);

      // Reset status
      clearTimeout(lostTimer);
      frame.classList.remove('found');
      pill.className = 'searching';
      pillText.textContent = '切換中…';
      hint.textContent = '將鏡頭對準你的 AR 目標圖片';

      // Show loading
      loadTxt.textContent = `載入目標 ${num} 中…`;
      loadingEl.classList.remove('hidden');
      loadingEl.style.opacity = '1';
      loadingEl.style.pointerEvents = 'all';

      // Rebuild scene after a tick
      setTimeout(() => buildScene(MINDS[num]), 300);
    }

    // 預載 Mind 檔案並轉為 Blob URL，省去切換時的下載與讀取時間
    async function initApp() {
      loadTxt.textContent = '正在預載 AR 目標模型… (1/2)';
      try {
        // 並行下載兩個模型
        const [res1, res2] = await Promise.all([
          fetch(MIND_URLS[1]),
          fetch(MIND_URLS[2])
        ]);
        
        loadTxt.textContent = '正在處理模型資料… (2/2)';
        const [blob1, blob2] = await Promise.all([
          res1.blob(),
          res2.blob()
        ]);

        // 將 Blob 轉為瀏覽器內部 URL
        MINDS[1] = URL.createObjectURL(blob1);
        MINDS[2] = URL.createObjectURL(blob2);

        loadTxt.textContent = '啟動 AR 引擎與相機中…';
        buildScene(MINDS[1]);
      } catch (err) {
        console.error('Mind files preload failed:', err);
        loadTxt.textContent = '載入失敗，請檢查檔案後重新整理';
      }
    }

    initApp();
  </script>
</body>
</html>
