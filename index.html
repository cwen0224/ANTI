<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindAR 圖像辨識測試</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 20px 0;
      gap: 12px;
    }

    #title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
      text-shadow: 0 0 20px rgba(99,179,237,.7);
    }

    /* status pill */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .04em;
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.15);
      transition: background .4s, border-color .4s, color .4s, box-shadow .4s;
      background: rgba(30,30,50,.7);
      color: rgba(200,200,220,.9);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    #status-pill.searching {
      background: rgba(20,30,60,.75);
      border-color: rgba(99,179,237,.4);
      color: #93c5fd;
      box-shadow: 0 0 20px rgba(99,179,237,.25);
    }

    #status-pill.found {
      background: rgba(6,78,59,.8);
      border-color: rgba(52,211,153,.6);
      color: #6ee7b7;
      box-shadow: 0 0 24px rgba(52,211,153,.45);
    }

    #status-pill.lost {
      background: rgba(60,20,20,.75);
      border-color: rgba(248,113,113,.4);
      color: #fca5a5;
      box-shadow: 0 0 20px rgba(248,113,113,.25);
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.7); }
    }

    /* ── corner scanner frame ── */
    #scanner-frame {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(72vw, 340px);
      aspect-ratio: 1;
      pointer-events: none;
      z-index: 998;
      transition: opacity .4s;
    }

    #scanner-frame .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: rgba(99,179,237,.7);
      border-style: solid;
      border-width: 0;
      transition: border-color .4s;
    }
    #scanner-frame.found .corner { border-color: rgba(52,211,153,.9); }

    .corner.tl { top:0; left:0;  border-top-width:3px;    border-left-width:3px;  border-radius:4px 0 0 0; }
    .corner.tr { top:0; right:0; border-top-width:3px;    border-right-width:3px; border-radius:0 4px 0 0; }
    .corner.bl { bottom:0; left:0;  border-bottom-width:3px; border-left-width:3px;  border-radius:0 0 0 4px; }
    .corner.br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 4px 0; }

    /* scan line */
    .scan-line {
      position: absolute;
      left: 6%; width: 88%; height: 2px;
      background: linear-gradient(90deg, transparent, #63b3ed, transparent);
      top: 0;
      animation: scan 2.2s ease-in-out infinite;
    }
    #scanner-frame.found .scan-line {
      background: linear-gradient(90deg, transparent, #34d399, transparent);
    }

    @keyframes scan {
      0%   { top: 4%; opacity: 1; }
      50%  { top: 92%; opacity: .8; }
      100% { top: 4%; opacity: 1; }
    }

    /* ── bottom hint ── */
    #hint {
      position: fixed;
      bottom: 28px; left: 0; right: 0;
      text-align: center;
      font-size: .75rem;
      color: rgba(255,255,255,.35);
      pointer-events: none;
      z-index: 999;
      letter-spacing: .05em;
    }

    /* A-Frame canvas fills viewport */
    a-scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div id="title">📷 MindAR 圖像追蹤測試</div>
    <div id="status-pill" class="searching">
      <div class="dot"></div>
      <span id="status-text">掃描中，請對準目標圖片…</span>
    </div>
  </div>

  <!-- Scanner frame overlay -->
  <div id="scanner-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
  </div>

  <!-- Bottom hint -->
  <div id="hint">將鏡頭對準你的 AR 目標圖片</div>

  <!-- MindAR A-Frame scene -->
  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target index 0: 偵測到時顯示發光方框 + 文字 -->
    <a-entity mindar-image-target="targetIndex: 0" id="target0">

      <!-- 半透明發光底板 -->
      <a-plane
        width="1" height="1"
        color="#34d399"
        opacity="0.18"
        position="0 0 0.001"
        material="shader: flat; side: double;"
      ></a-plane>

      <!-- 外框線 -->
      <a-plane
        width="1.05" height="1.05"
        color="#34d399"
        opacity="0.6"
        position="0 0 0"
        material="wireframe: true; shader: flat;"
      ></a-plane>

      <!-- 辨識成功文字 -->
      <a-text
        value="✔ 圖像辨識成功！"
        align="center"
        color="#6ee7b7"
        width="2"
        position="0 0.62 0"
        font="https://cdn.aframe.io/fonts/Roboto-msdf.json"
        font-image="https://cdn.aframe.io/fonts/Roboto-msdf.png"
      ></a-text>

    </a-entity>
  </a-scene>

  <script>
    const pill     = document.getElementById('status-pill');
    const pillText = document.getElementById('status-text');
    const frame    = document.getElementById('scanner-frame');
    const hint     = document.getElementById('hint');

    function setFound(on) {
      if (on) {
        pill.classList.replace('searching', 'found') || (pill.className = 'found');
        pill.classList.remove('lost');
        pillText.textContent = '✅ 目標圖片已辨識！';
        frame.classList.add('found');
        hint.textContent = 'MindAR 成功追蹤目標 🎉';
      } else {
        pill.className = 'lost';
        pillText.textContent = '❌ 目標丟失，繼續掃描…';
        frame.classList.remove('found');
        hint.textContent = '將鏡頭對準你的 AR 目標圖片';

        // switch back to searching after 1.5 s
        setTimeout(() => {
          if (!pill.classList.contains('found')) {
            pill.className = 'searching';
            pillText.textContent = '掃描中，請對準目標圖片…';
          }
        }, 1500);
      }
    }

    // Wait for A-Frame + MindAR to be ready
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const target = document.getElementById('target0');
      target.addEventListener('targetFound',  () => setFound(true));
      target.addEventListener('targetLost',   () => setFound(false));
    });
  </script>
</body>
</html>
